                if (!aiText) throw new Error("Format respons API tidak dikenali atau kosong.");

                const parts = aiText.split("===JAWABAN===");
                const soalText = parts[0] ? formatMarkdown(parts[0].trim()) : "Terjadi kesalahan dalam menyusun soal.";
                const jawabanText = parts[1] ? formatMarkdown(parts[1].trim()) : "<i>Jawaban/pembahasan tidak disertakan oleh AI.</i>";

                contentBox.innerHTML = `
                    <div class="mb-8 bg-white dark:bg-slate-700 p-6 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                        <div class="flex items-center text-blue-700 dark:text-blue-300 font-bold mb-4 border-b border-blue-100 dark:border-blue-900 pb-3 text-lg">
                            <i class="fas fa-file-code mr-3"></i> Latihan Soal OSN
                        </div>
                        <div class="text-slate-800 dark:text-slate-200 leading-relaxed text-[15px] lg:text-base">
                            ${soalText}
                        </div>
                    </div>
                    
                    <button id="toggle-answer-btn" onclick="document.getElementById('answer-section').classList.toggle('hidden'); this.innerHTML = this.innerHTML.includes('Tampilkan') ? '<i class=\\'fas fa-eye-slash mr-2\\'></i> Sembunyikan Pembahasan' : '<i class=\\'fas fa-eye mr-2\\'></i> Tampilkan Pembahasan & Jawaban';" class="bg-slate-800 dark:bg-slate-600 hover:bg-slate-900 dark:hover:bg-slate-500 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm mb-4 w-full md:w-auto shadow-md">
                        <i class="fas fa-eye mr-2"></i> Tampilkan Pembahasan & Jawaban
                    </button>

                    <div id="answer-section" class="hidden mt-2 bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-xl p-6 shadow-inner overflow-x-auto">
                        <div class="flex items-center text-emerald-800 dark:text-emerald-400 font-bold mb-4 border-b border-emerald-200 dark:border-emerald-800 pb-3 text-lg">
                            <i class="fas fa-check-circle mr-3"></i> Kunci Jawaban & Pembahasan
                        </div>
                        <div class="text-slate-800 dark:text-slate-200 leading-relaxed text-[15px] lg:text-base">
                            ${jawabanText}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Detail Error API:", error);
                console.error("Endpoint yang dipanggil:", CLOUDFLARE_WORKER_URL);
                
                let errorDetails = error.message;
                if (error.message.includes("Failed to fetch")) {
                    errorDetails = `
Gagal menghubungi endpoint: ${CLOUDFLARE_WORKER_URL}

Kemungkinan penyebab:
1. Endpoint Cloudflare Workers tidak aktif/offline
2. CORS error - endpoint tidak mengizinkan akses dari domain ini
3. Network/Internet error

Solusi:
- Pastikan URL endpoint benar: ${CLOUDFLARE_WORKER_URL}
- Periksa Cloudflare Workers console untuk error
- Tambahkan CORS header di Cloudflare Workers:
  response.headers.set("Access-Control-Allow-Origin", "*")
                    `;
                }
                
                contentBox.innerHTML = `
                    <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 p-6 rounded-xl">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4 block text-center"></i>
                        <h4 class="font-bold text-lg text-center mb-4">Gagal Menghubungi Server AI</h4>
                        <div class="text-sm mb-6 bg-red-100 dark:bg-red-900/50 p-4 rounded overflow-x-auto text-left font-mono whitespace-pre-wrap break-words max-h-64 overflow-y-auto">
${errorDetails}
                        </div>
                        <div class="flex gap-3 justify-center flex-wrap">
                            <button onclick="generateSoalAI('${chapterTopic}')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition-colors text-sm">
                                <i class="fas fa-redo mr-2"></i> Coba Lagi
                            </button>
                            <button onclick="closeModal()" class="bg-slate-400 hover:bg-slate-500 text-white font-bold py-2 px-6 rounded-lg transition-colors text-sm">
                                <i class="fas fa-times mr-2"></i> Tutup
                            </button>
                        </div>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
