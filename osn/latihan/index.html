        function formatMarkdown(text) {
            let formatted = text;
            
            formatted = formatted.replace(/```[a-zA-Z]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formatted = formatted.replace(/`([^`\n]+)`/g, '<code>$1</code>');

            formatted = formatted.replace(/\*([^*]+)\*/g, '<i>$1</i>');
            formatted = formatted.replace(/\n/g, '<br>');

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP Error ${response.status}: ${errText}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function generateSoalAI(chapterTopic) {
            openModal();
            const contentBox = document.getElementById('ai-modal-content');
            
            contentBox.innerHTML = `
                <div class="flex flex-col items-center justify-center py-16 text-center">
                    <i class="fas fa-circle-notch fa-spin text-5xl text-blue-500 mb-6"></i>
                    <h4 class="text-xl font-bold text-slate-800">AI sedang meracik soal level OSN...</h4>
                    <p class="text-sm text-slate-500 mt-2 max-w-md">Menyusun logika untuk materi: <br><b class="text-blue-600">${chapterTopic}</b></p>
                </div>
            `;

            const prompt = `Sebagai pakar pembuat soal Olimpiade Sains Nasional (OSN) bidang Informatika/Komputer, buatkan 1 soal latihan analitik, logika, atau algoritma (dengan C++/pseudocode jika relevan) berbahasa Indonesia yang sangat menantang tentang topik persis berikut ini: "${chapterTopic}".
            
            Syarat penulisan:
            1. Buat soal ceritanya dulu dengan jelas. Jangan langsung berikan jawaban.
            2. Gunakan pemisah persis dengan teks "===JAWABAN===" (tanpa tanda kutip) setelah soal selesai.
            3. Di bawah pemisah, berikan kunci jawaban dan pembahasan logika/matematika/kodenya langkah demi langkah.`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Kamu adalah asisten pintar pembuat soal olimpiade komputer. Selalu jawab dalam bahasa Indonesia." }] }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!aiText) throw new Error("Format respons API tidak dikenali atau kosong.");

                const parts = aiText.split("===JAWABAN===");
                const soalText = parts[0] ? formatMarkdown(parts[0].trim()) : "Terjadi kesalahan dalam menyusun soal.";
                const jawabanText = parts[1] ? formatMarkdown(parts[1].trim()) : "<i>Jawaban/pembahasan tidak disertakan oleh AI.</i>";

                contentBox.innerHTML = `
                    <div class="mb-8 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex items-center text-blue-700 font-bold mb-4 border-b border-blue-100 pb-3 text-lg">
                            <i class="fas fa-file-code mr-3"></i> Latihan Soal OSN
                        </div>
                        <div class="text-slate-800 leading-relaxed text-[15px] lg:text-base">
                            ${soalText}
                        </div>
                    </div>
                    
                    <button id="toggle-answer-btn" onclick="document.getElementById('answer-section').classList.toggle('hidden'); this.innerHTML = this.innerHTML.includes('Tampilkan') ? '<i class=\\'fas fa-eye-slash mr-2\\'></i> Sembunyikan Pembahasan' : '<i class=\\'fas fa-eye mr-2\\'></i> Tampilkan Pembahasan & Jawaban';" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm mb-4 w-full md:w-auto shadow-md">
                        <i class="fas fa-eye mr-2"></i> Tampilkan Pembahasan & Jawaban
                    </button>

                    <div id="answer-section" class="hidden mt-2 bg-emerald-50 border border-emerald-200 rounded-xl p-6 shadow-inner overflow-x-auto">
                        <div class="flex items-center text-emerald-800 font-bold mb-4 border-b border-emerald-200 pb-3 text-lg">
                            <i class="fas fa-check-circle mr-3"></i> Kunci Jawaban & Pembahasan
                        </div>
                        <div class="text-slate-800 leading-relaxed text-[15px] lg:text-base">
                            ${jawabanText}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Detail Error API:", error);
                contentBox.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-600 p-6 rounded-xl text-center">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <h4 class="font-bold text-lg">Gagal menghubungi Gemini AI</h4>
                        <div class="text-sm mt-2 mb-6 bg-red-100 p-3 rounded overflow-x-auto text-left font-mono whitespace-pre-wrap">${error.message}</div>
                        <button onclick="generateSoalAI('${chapterTopic}')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition-colors text-sm">
                            <i class="fas fa-redo mr-2"></i> Coba Lagi
                        </button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
