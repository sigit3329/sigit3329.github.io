                    lockIcon.className = "fas fa-unlock ml-2 text-xs text-emerald-400";
                } else {
                    lockIcon.className = "fas fa-lock ml-2 text-xs text-red-400";
                }
            }
        };

        // Trigger verifikasi saat Enter ditekan
        document.getElementById('kunci-pwd-input')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyKunciPassword();
            }
        });

        // =========================================================================
        // MOBILE MENU & INITIALIZATION
        // =========================================================================
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            const navLinks = document.getElementById('nav-links');
            if (navLinks.classList.contains('hidden')) {
                navLinks.classList.remove('hidden');
                navLinks.classList.add('flex');
            } else {
                navLinks.classList.add('hidden');
                navLinks.classList.remove('flex');
            }
        });

        // =========================================================================
        // LOGIKA ZOOM GAMBAR (IMAGE VIEWER)
        // =========================================================================
        const openImageViewer = (src) => {
            const modal = document.getElementById('image-viewer-modal');
            const img = document.getElementById('viewer-image');
            img.src = src;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Trigger animasi muncul
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                img.classList.remove('scale-95');
                img.classList.add('scale-100');
            }, 10);
        };

        const closeImageViewer = () => {
            const modal = document.getElementById('image-viewer-modal');
            const img = document.getElementById('viewer-image');
            
            // Trigger animasi hilang
            modal.classList.add('opacity-0');
            img.classList.remove('scale-100');
            img.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                img.src = ""; // Bersihkan memori gambar
            }, 300);
        };

        // Delegasi event klik untuk semua gambar di dalam main-content
        document.addEventListener('click', function(e) {
            if (e.target && e.target.tagName === 'IMG' && e.target.closest('#main-content')) {
                openImageViewer(e.target.src);
            }
        });

        window.onload = () => {
            initTheme();
            renderSidebar();
            // Pilih Bagian A sebagai default yang terbuka
            const firstBtn = document.querySelector('.nav-btn');
            showBagian('bagian-a', firstBtn);
        };

    </script>
</body>
</html>
